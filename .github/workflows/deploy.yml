name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CV.sln

      - name: Build
        run: dotnet build CV.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CV.sln --configuration Release --no-build --verbosity normal

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # --------------------------------------------------------------------
    # Target: Plesk on Windows (IIS).
    #
    # The FTP service requires TLS for login (plain FTP is refused with 530) and
    # presents a self-signed certificate. We deploy with curl over explicit FTPS:
    #   --ssl-reqd  force TLS (login succeeds)
    #   -k          accept the self-signed certificate
    #   --ftp-pasv  passive mode
    # curl reuses the control connection's TLS session for the data channel, which
    # is what IIS FTP requires (and is why lftp/plain-FTP failed here).
    #
    # Repository secrets:
    #   PLESK_FTP_SERVER / PLESK_FTP_USERNAME / PLESK_FTP_PASSWORD
    #   ConnectionStrings__CvDb   -> SQL Server connection string
    #   CvAdmin__ApiKey           -> secret for the admin write API
    #
    # The FTP user is chrooted to the site's web root, so paths are relative to "/".
    # EF Core migrations are applied automatically on app startup.
    # IIS locks the running app's DLLs, so app_offline.htm is uploaded first
    # (stops the app + releases locks) and removed at the end.
    # --------------------------------------------------------------------
    env:
      FTP_HOST: ${{ secrets.PLESK_FTP_SERVER }}
      FTP_USER: ${{ secrets.PLESK_FTP_USERNAME }}
      FTP_PASS: ${{ secrets.PLESK_FTP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Self-contained so the server doesn't depend on a specific installed runtime.
      - name: Publish
        run: dotnet publish CV.Api/CV.Api.csproj --configuration Release --self-contained --runtime win-x64 --output ./publish

      # Inject secrets into the published app. jq safely escapes special characters.
      # This file is gitignored and only exists on the runner + server, never in the repo.
      - name: Create production config
        env:
          CV_DB: ${{ secrets.ConnectionStrings__CvDb }}
          CV_KEY: ${{ secrets.CvAdmin__ApiKey }}
        run: |
          jq -n '{ConnectionStrings: {CvDb: env.CV_DB}, CvAdmin: {ApiKey: env.CV_KEY}}' \
            > ./publish/appsettings.Production.json

      - name: Take app offline (release IIS file locks)
        continue-on-error: true
        run: |
          echo '<html><body><h1>Site is updating, please refresh in a moment...</h1></body></html>' > app_offline.htm
          curl -k --ssl-reqd --ftp-pasv --connect-timeout 30 \
            -T app_offline.htm "ftp://${FTP_HOST}/app_offline.htm" \
            --user "${FTP_USER}:${FTP_PASS}"
          sleep 5

      - name: Deploy over FTPS
        run: |
          config="$(mktemp)"
          while IFS= read -r -d '' f; do
            rel="${f#publish/}"
            printf -- '-T "%s"\nurl = "ftp://%s/%s"\n' "$f" "$FTP_HOST" "$rel" >> "$config"
          done < <(find publish -type f -print0)
          curl -k --ssl-reqd --ftp-pasv --ftp-create-dirs --fail -sS \
            --user "${FTP_USER}:${FTP_PASS}" \
            -K "$config"
          echo "Uploaded $(find publish -type f | wc -l) files."

      - name: Bring app online
        if: always()
        continue-on-error: true
        run: |
          curl -k --ssl-reqd --ftp-pasv --connect-timeout 30 \
            "ftp://${FTP_HOST}/" \
            --user "${FTP_USER}:${FTP_PASS}" \
            -Q "DELE app_offline.htm"

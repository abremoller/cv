name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish CV.Api/CV.Api.csproj --configuration Release --self-contained --runtime win-x64 --output ./publish

      # Inject secrets into the published app (gitignored; never committed).
      - name: Create production config
        env:
          CV_DB: ${{ secrets.ConnectionStrings__CvDb }}
          CV_KEY: ${{ secrets.CvAdmin__ApiKey }}
        run: |
          jq -n '{ConnectionStrings: {CvDb: env.CV_DB}, CvAdmin: {ApiKey: env.CV_KEY}}' \
            > ./publish/appsettings.Production.json

      - name: Create logs directory in publish output
        run: mkdir -p ./publish/logs

      - name: Take app offline (release IIS file locks)
        continue-on-error: true
        run: |
          echo '<html><body><h1>Site is updating, please refresh in a moment...</h1></body></html>' > app_offline.htm
          curl --ftp-pasv --connect-timeout 30 -T app_offline.htm "ftp://${{ secrets.PLESK_FTP_SERVER }}/" --user "${{ secrets.PLESK_FTP_USERNAME }}:${{ secrets.PLESK_FTP_PASSWORD }}"
          sleep 5

      - name: Deploy to Plesk via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_FTP_SERVER }}
          username: ${{ secrets.PLESK_FTP_USERNAME }}
          password: ${{ secrets.PLESK_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: ./
          exclude: |
            **/logs/**
            **/DataProtection-Keys/**

      - name: Bring app online
        continue-on-error: true
        run: |
          curl --ftp-pasv --connect-timeout 30 "ftp://${{ secrets.PLESK_FTP_SERVER }}/" --user "${{ secrets.PLESK_FTP_USERNAME }}:${{ secrets.PLESK_FTP_PASSWORD }}" -Q "DELE app_offline.htm"

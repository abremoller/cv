name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish CV.Api/CV.Api.csproj --configuration Release --self-contained --runtime win-x64 --output ./publish

      # Inject secrets into the published app (gitignored; never committed).
      - name: Create production config
        env:
          CV_DB: ${{ secrets.ConnectionStrings__CvDb }}
          CV_KEY: ${{ secrets.CvAdmin__ApiKey }}
        run: |
          jq -n '{ConnectionStrings: {CvDb: env.CV_DB}, CvAdmin: {ApiKey: env.CV_KEY}}' \
            > ./publish/appsettings.Production.json

      - name: Create logs directory in publish output
        run: mkdir -p ./publish/logs

      # Credentials passed via env (NOT interpolated into the shell command),
      # so a password with special characters isn't mangled by the shell.
      - name: Take app offline (release IIS file locks)
        env:
          FTP_HOST: ${{ secrets.PLESK_FTP_SERVER }}
          FTP_USER: ${{ secrets.PLESK_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.PLESK_FTP_PASSWORD }}
        run: |
          echo '<html><body><h1>Site is updating, please refresh in a moment...</h1></body></html>' > app_offline.htm
          curl --ftp-pasv --connect-timeout 30 -T app_offline.htm "ftp://${FTP_HOST}/" --user "${FTP_USER}:${FTP_PASS}" \
            || echo "Note: app_offline upload skipped (best-effort step)."
          sleep 5

      - name: Deploy to Plesk via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_FTP_SERVER }}
          username: ${{ secrets.PLESK_FTP_USERNAME }}
          password: ${{ secrets.PLESK_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: ./
          exclude: |
            **/logs/**
            **/DataProtection-Keys/**

      - name: Bring app online
        if: always()
        env:
          FTP_HOST: ${{ secrets.PLESK_FTP_SERVER }}
          FTP_USER: ${{ secrets.PLESK_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.PLESK_FTP_PASSWORD }}
        run: |
          curl --ftp-pasv --connect-timeout 30 "ftp://${FTP_HOST}/" --user "${FTP_USER}:${FTP_PASS}" -Q "DELE app_offline.htm" \
            || echo "Note: app_offline removal skipped (best-effort step)."

      # Fail the deploy loudly if the site doesn't come back up. Polls the
      # liveness endpoint through IIS cold-start, then prints /api/diag (which is
      # secret-free) so a broken deploy shows its cause right here in the log.
      - name: Smoke test — verify site is healthy
        env:
          SITE_URL: https://cv.abremoller.com
        run: |
          echo "Waiting for ${SITE_URL}/api/health to return 200 ..."
          healthy=0
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${SITE_URL}/api/health" || echo 000)
            if [ "$code" = "200" ]; then
              echo "✅ Liveness OK after ~$(( (i - 1) * 5 ))s"
              healthy=1
              break
            fi
            echo "  attempt ${i}/30: HTTP ${code} — retrying in 5s"
            sleep 5
          done

          echo "----- /api/diag -----"
          curl -s --max-time 15 "${SITE_URL}/api/diag" || echo "(diag unreachable)"
          echo

          if [ "$healthy" != "1" ]; then
            echo "❌ Site never became live within ~150s (app failed to start)."
            exit 1
          fi

          # Liveness alone isn't enough — /api/health touches nothing. Verify the
          # database-backed read path too, so a broken DbContext/connection (which
          # returns 5xx) fails the deploy instead of passing on a green health check.
          cv_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "${SITE_URL}/api/cv" || echo 000)
          if [ "$cv_code" -ge 500 ]; then
            echo "❌ /api/cv returned ${cv_code} — the app is up but the database path is broken. See /api/diag above."
            exit 1
          fi
          echo "✅ /api/cv returned ${cv_code} (DB path OK). Deploy verified."

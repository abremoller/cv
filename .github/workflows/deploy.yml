name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CV.sln

      - name: Build
        run: dotnet build CV.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CV.sln --configuration Release --no-build --verbosity normal

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # --------------------------------------------------------------------
    # Target: Plesk on Windows (IIS), deployed over plain FTP (passive).
    # (The FTP service uses a self-signed cert and IIS rejects FTPS data-channel
    #  protection, so we use plain FTP — matching the working Whip pipeline.)
    #
    # Repository secrets:
    #   PLESK_FTP_SERVER / PLESK_FTP_USERNAME / PLESK_FTP_PASSWORD
    #   ConnectionStrings__CvDb   -> SQL Server connection string
    #   CvAdmin__ApiKey           -> secret for the admin write API
    #
    # The FTP user is chrooted to the site's web root, so server-dir is "./".
    # EF Core migrations are applied automatically on app startup.
    # IIS locks the running app's DLLs, so we drop app_offline.htm first
    # (stops the app + releases locks) and remove it afterwards.
    # --------------------------------------------------------------------
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Self-contained so the server doesn't depend on a specific installed runtime.
      - name: Publish
        run: dotnet publish CV.Api/CV.Api.csproj --configuration Release --self-contained --runtime win-x64 --output ./publish

      # Inject secrets into the published app. jq safely escapes special characters.
      # This file is gitignored and only exists on the runner + server, never in the repo.
      - name: Create production config
        env:
          CV_DB: ${{ secrets.ConnectionStrings__CvDb }}
          CV_KEY: ${{ secrets.CvAdmin__ApiKey }}
        run: |
          jq -n '{ConnectionStrings: {CvDb: env.CV_DB}, CvAdmin: {ApiKey: env.CV_KEY}}' \
            > ./publish/appsettings.Production.json

      - name: Take app offline (release IIS file locks)
        continue-on-error: true
        run: |
          echo '<html><body><h1>Site is updating, please refresh in a moment...</h1></body></html>' > app_offline.htm
          curl --ftp-pasv --connect-timeout 30 -T app_offline.htm "ftp://${{ secrets.PLESK_FTP_SERVER }}/" --user "${{ secrets.PLESK_FTP_USERNAME }}:${{ secrets.PLESK_FTP_PASSWORD }}"
          sleep 5

      - name: Deploy to Plesk via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_FTP_SERVER }}
          username: ${{ secrets.PLESK_FTP_USERNAME }}
          password: ${{ secrets.PLESK_FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: ./
          exclude: |
            **/logs/**
            **/DataProtection-Keys/**

      - name: Bring app online
        continue-on-error: true
        run: |
          curl --ftp-pasv --connect-timeout 30 "ftp://${{ secrets.PLESK_FTP_SERVER }}/" --user "${{ secrets.PLESK_FTP_USERNAME }}:${{ secrets.PLESK_FTP_PASSWORD }}" -Q "DELE app_offline.htm"
